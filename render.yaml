services:
  - type: web
    name: openclaw-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: HOME
        value: /home/node
      - key: TERM
        value: xterm-256color
      - key: OPENCLAW_DIR
        value: /home/node/.openclaw
      - key: SUPABASE_URL
        value: https://iagsrbmeviwmozauhenk.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false  # Coller dans Render dashboard
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false  # Voir ~/.openclaw/openclaw.json gateway.auth.token
      - key: GROQ_API_KEY
        sync: false  # Voir ~/.openclaw/openclaw.json models.providers.groq.apiKey
      - key: ANTHROPIC_API_KEY
        sync: false
